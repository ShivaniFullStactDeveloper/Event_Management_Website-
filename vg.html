<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Karyam Event Management</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      padding: 20px;
      overflow-x: hidden;
    }

    .header {
      text-align: center;
      margin-bottom: 60px;
      animation: fadeInDown 0.8s ease;
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-family: 'Georgia', serif;
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: bold;
      color: #f5d76e;
      margin-bottom: 20px;
      text-shadow: 2px 2px 8px rgba(245, 215, 110, 0.3);
      letter-spacing: 2px;
    }

    p {
      font-size: clamp(1rem, 2vw, 1.3rem);
      max-width: 900px;
      margin: 0 auto;
      font-style: italic;
      color: #ccc;
      line-height: 1.6;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 30px;
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }
    
    .video-item {
      position: relative;
      padding-bottom: 56.25%; /* 16:9 aspect ratio */
      height: 0;
      overflow: hidden;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(245, 215, 110, 0.2);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      animation: fadeInUp 0.8s ease forwards;
      opacity: 0;
      background: linear-gradient(145deg, #1a1a1a, #2a2a2a);
      cursor: pointer;
    }
    
    .video-item:nth-child(1) { animation-delay: 0.1s; }
    .video-item:nth-child(2) { animation-delay: 0.2s; }
    .video-item:nth-child(3) { animation-delay: 0.3s; }
    .video-item:nth-child(4) { animation-delay: 0.4s; }
    .video-item:nth-child(5) { animation-delay: 0.5s; }
    .video-item:nth-child(6) { animation-delay: 0.6s; }
    .video-item:nth-child(7) { animation-delay: 0.7s; }
    .video-item:nth-child(8) { animation-delay: 0.8s; }
    .video-item:nth-child(9) { animation-delay: 0.9s; }
    .video-item:nth-child(10) { animation-delay: 1s; }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(40px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    
    .video-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border-radius: 20px;
      padding: 3px;
      background: linear-gradient(45deg, #f5d76e, #d4af37, #f5d76e);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    
    .video-item:hover {
      transform: translateY(-15px) scale(1.02);
      box-shadow: 0 25px 60px rgba(245, 215, 110, 0.4);
    }

    .video-item:hover::before {
      opacity: 1;
    }
    
    .video-item iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 20px;
    }

    /* Play Button Overlay */
    .play-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80px;
      height: 80px;
      background: rgba(245, 215, 110, 0.9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      transition: all 0.3s ease;
      z-index: 10;
    }

    .play-overlay::after {
      content: '';
      width: 0;
      height: 0;
      border-left: 25px solid #000;
      border-top: 15px solid transparent;
      border-bottom: 15px solid transparent;
      margin-left: 5px;
    }

    .video-item:hover .play-overlay {
      transform: translate(-50%, -50%) scale(1.2);
      box-shadow: 0 10px 30px rgba(245, 215, 110, 0.6);
    }
    
    /* Modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.97);
      animation: fadeIn 0.3s ease;
      padding: 20px;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    .modal.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .modal-content {
      position: relative;
      width: 100%;
      max-width: 1200px;
      padding-bottom: 56.25%; /* 16:9 */
      background: #000;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 80px rgba(245, 215, 110, 0.4);
      animation: scaleIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    @keyframes scaleIn {
      from {
        transform: scale(0.8) rotateX(20deg);
        opacity: 0;
      }
      to {
        transform: scale(1) rotateX(0);
        opacity: 1;
      }
    }
    
    .modal-content iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    
    .close, .prev, .next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: linear-gradient(145deg, #f5d76e, #d4af37);
      color: #000;
      border: none;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.8rem;
      font-weight: bold;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1001;
      box-shadow: 0 5px 20px rgba(245, 215, 110, 0.3);
    }
    
    .close:hover, .prev:hover, .next:hover {
      background: linear-gradient(145deg, #d4af37, #f5d76e);
      transform: translateY(-50%) scale(1.15);
      box-shadow: 0 10px 30px rgba(245, 215, 110, 0.6);
    }
    
    .close {
      top: 20px;
      right: 20px;
      transform: none;
    }
    
    .close:hover {
      transform: scale(1.15) rotate(90deg);
    }
    
    .prev { left: 30px; }
    .next { right: 30px; }
    
    /* Responsive */
    @media (max-width: 768px) {
      .gallery {
        grid-template-columns: 1fr;
        gap: 25px;
        padding: 10px;
      }
      
      .modal {
        padding: 10px;
      }
      
      .close, .prev, .next {
        width: 45px;
        height: 45px;
        font-size: 1.4rem;
      }
      
      .prev { left: 10px; }
      .next { right: 10px; }
      .close { top: 10px; right: 10px; }

      .play-overlay {
        width: 60px;
        height: 60px;
      }

      .play-overlay::after {
        border-left: 20px solid #000;
        border-top: 12px solid transparent;
        border-bottom: 12px solid transparent;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 10px;
      }

      .header {
        margin-bottom: 40px;
      }

      h1 {
        margin-bottom: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Karyam Event Management</h1>
    <p>"From elegant weddings to lively birthdays, grand parties to professional corporate events—explore the vibrant memories captured by Karyam Event Management."</p>
  </div>

  <!-- Gallery -->
  <div class="gallery" id="gallery"></div>

  <!-- Modal -->
  <div class="modal" id="modal" onclick="closeModal()">
    <button class="close" onclick="closeModal(); event.stopPropagation();">&times;</button>
    <button class="prev" onclick="changeVideo(-1); event.stopPropagation();">&#9664;</button>
    <div class="modal-content" onclick="event.stopPropagation();">
      <iframe id="modalVideo" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>
    <button class="next" onclick="changeVideo(1); event.stopPropagation();">&#9654;</button>
  </div>

  <script>
    // Single array of all videos
    const videos = [
      "https://www.youtube.com/embed/dQw4w9WgXcQ",
      "https://www.youtube.com/embed/jNQXAC9IVRw",
      "https://www.youtube.com/embed/9bZkp7q19f0",
      "https://www.youtube.com/embed/kJQP7kiw5Fk",
      "https://www.youtube.com/embed/OPf0YbXqDm0",
      "https://www.youtube.com/embed/60ItHLz5WEA",
      "https://www.youtube.com/embed/L_jWHffIx5E",
      "https://www.youtube.com/embed/y6Sxv-sUYtM",
      "https://www.youtube.com/embed/uxpDa-c-4Mc",
      "https://www.youtube.com/embed/Gs069dndIYk"
    ];

    let currentIndex = 0;

    // Initialize gallery
    function initGallery() {
      const gallery = document.getElementById("gallery");
      gallery.innerHTML = videos.map((video, i) =>
        `<div class="video-item" onclick="openModal(${i})">
          <div class="play-overlay"></div>
          <iframe src="${video}" allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>`
      ).join("");
    }

    function openModal(index) {
      currentIndex = index;
      const modal = document.getElementById("modal");
      const modalVideo = document.getElementById("modalVideo");
      modal.classList.add("active");
      modalVideo.src = videos[currentIndex] + "?autoplay=1";
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      const modal = document.getElementById("modal");
      const modalVideo = document.getElementById("modalVideo");
      modal.classList.remove("active");
      modalVideo.src = "";
      document.body.style.overflow = 'auto';
    }

    function changeVideo(direction) {
      currentIndex += direction;
      if (currentIndex < 0) currentIndex = videos.length - 1;
      if (currentIndex >= videos.length) currentIndex = 0;
      document.getElementById("modalVideo").src = videos[currentIndex] + "?autoplay=1";
    }

    // Keyboard navigation
    document.addEventListener("keydown", e => {
      if (e.key === "Escape") closeModal();
      if (e.key === "ArrowLeft") changeVideo(-1);
      if (e.key === "ArrowRight") changeVideo(1);
    });

    // Load gallery on page load
    initGallery();
  </script>
</body>
</html>
